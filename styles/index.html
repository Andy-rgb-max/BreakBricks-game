<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="style.css">
    <title>BreakBricks</title>
</head>
<body>
    <main>
    <div id="game-intro">
        <!-- logo, button start, instruction et img de contrôle -->
        <img src="../images/Bg.png" alt="" class="BreakBricks-img">
        <br />
        <button id="start-btn">
            <img src="../images/Let's play.png" alt="">
        </button>
        <p>Use the left and right arrow of your keyboard to control the pad !</p>
    </div>


    <div id="game-container">
        <!-- stats et jeu lui-même -->
         <div class="container">
            <div class="left">
            <p>Score: <span id="score">0</span></p>
            </div>

            <div class="right">
            <img src="../images/Heart.png" alt="" class="heart-logo">
            <img src="../images/Heart.png" alt="" class="heart-logo">
            <img src="../images/Heart.png" alt="" class="heart-logo">
         </div>
         </div>
    

    <div id="game-screen">
        <!-- jeu et éléments dynamiques, caché au départ avec display: none -->
        <img src="../images/bg2.png" alt="" class="bg2-logo">
    </div>
    </div>


    <div id="game-end">
        <!-- Game over et boutton restart -->
        <img src="../images/Bg3.png" alt="" class="endgame-logo">
        <button id="restart-btn">
            <img src="../images/Restart.png" alt="">
        </button>
    </div>
    </main>

    <script type="text/javascript" src="../js/game.js"></script>
    <script type="text/javascript" src="../js/player.js"></script>
    <script type="text/javascript" src="../js/script.js"></script>
</body>
</html>
