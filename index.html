<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="./styles/style.css">
    <title>BreakBricks</title>
</head>
<body>
    <main>
    <div id="game-intro">
        <!-- logo, button start, instruction et img de contrôle -->
        <img src="./images/Bg.png" alt="BreakBricks-logo" class="BreakBricks-img">
       <div class="start-container">
    <button id="start-btn">
        <img src="./images/Let's play.png" alt="Let's play">
    </button>
    <p class="start-text">
        Use the left and right arrow keys to move the paddle, then press SPACE to launch the ball !
    </p>
</div>
    </div>


    <div id="game-container">
        <!-- stats et jeu lui-même -->
    
    <div id="game-screen">
        <!-- jeu et éléments dynamiques, caché au départ avec display: none -->
        <div class="container">
            <div class="left">
            <p>Score: <span id="score">0</span></p>
            </div>

            <div class="right">
            <img src="./images/Heart.png" alt="" class="heart-logo">
            <img src="./images/Heart.png" alt="" class="heart-logo">
            <img src="./images/Heart.png" alt="" class="heart-logo">
         </div>
         </div>
    </div>
    </div>


   <div id="game-end">
    <img src="./images/Bg3.png" alt="" class="endgame-logo">

    <p id="final-score">0</p>

    <button id="restart-btn">
        <img src="./images/Restart.png" alt="">
    </button>
</div>
    </main>

    <script type="text/javascript" src="./js/player.js"></script>
    <script type="text/javascript" src="./js/ball.js"></script>
    <script type="text/javascript" src="./js/brick.js"></script>
    <script type="text/javascript" src="./js/game.js"></script>
    <script type="text/javascript" src="./js/script.js"></script>

</body>
</html>
