<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="styles/style.css">
    <title>BreakBricks</title>
</head>

<body>
<main>

    <!-- INTRO -->
    <div id="game-intro">
        <img src="images/Bg.png" alt="BreakBricks-logo" class="BreakBricks-img">

        <div class="start-container">
            <button id="start-btn">
                <img src="images/Let's play.png" alt="Let's play">
            </button>

            <p class="start-text">
                Use the left and right arrow keys to move the paddle, then press SPACE to launch the ball !
            </p>
        </div>
    </div>

    <!-- GAME -->
    <div id="game-container">
        <div id="game-screen">

            <div class="container">
                <div class="left">
                    <p>Score: <span id="score">0</span></p>
                </div>

                <div class="right">
                    <img src="images/Heart.png" class="heart-logo">
                    <img src="images/Heart.png" class="heart-logo">
                    <img src="images/Heart.png" class="heart-logo">
                </div>
            </div>

        </div>
    </div>

    <!-- GAME OVER -->
    <div id="game-end">
        <img src="images/Bg3.png" alt="" class="endgame-logo">

        <p id="final-score">0</p>

        <button id="restart-btn">
            <img src="images/Restart.png" alt="">
        </button>
    </div>

</main>

<!-- SCRIPTS -->
<script src="js/player.js"></script>
<script src="js/ball.js"></script>
<script src="js/brick.js"></script>
<script src="js/game.js"></script>
<script src="js/script.js"></script>

</body>
</html>
